;=====================================================
;  Polybar — Dracula Theme
;  CHUWI MiniBook X / i3wm
;=====================================================

[colors]
bg         = #282A36
bg-alt     = #44475A
fg         = #F8F8F2
fg-dim     = #6272A4
purple     = #BD93F9
pink       = #FF79C6
cyan       = #8BE9FD
green      = #50FA7B
orange     = #FFB86C
red        = #FF5555

;-----------------------------------------------------

[bar/main]
monitor         = DSI-1
width           = 100%
height          = 34
radius          = 0
fixed-center    = true

background      = ${colors.bg}
foreground      = ${colors.fg}

line-size       = 2

border-bottom-size  = 2
border-bottom-color = ${colors.bg-alt}

padding-left    = 2
padding-right   = 2
module-margin   = 0

font-0 = JetBrainsMono Nerd Font:style=Regular:size=10;3
font-1 = JetBrainsMono Nerd Font:style=Bold:size=11;3
font-2 = Sarabun:style=Regular:size=10;3

modules-left   = i3
modules-center = date
modules-right  = keyboard cpu memory battery wifi tray

enable-ipc     = true
cursor-click   = pointer

;-----------------------------------------------------

[module/i3]
type            = internal/i3
index-sort      = true
pin-workspaces  = true
wrapping-scroll = false

format          = <label-state> <label-mode>

label-mode            =  %mode%
label-mode-padding    = 2
label-mode-foreground = ${colors.bg}
label-mode-background = ${colors.pink}

label-focused              = %index%
label-focused-foreground   = ${colors.purple}
label-focused-padding      = 2
label-focused-underline    = ${colors.purple}

label-unfocused            = %index%
label-unfocused-foreground = ${colors.fg-dim}
label-unfocused-padding    = 2

label-visible              = %index%
label-visible-foreground   = ${colors.fg}
label-visible-padding      = 2
label-visible-underline    = ${colors.fg-dim}

label-urgent               = %index%
label-urgent-foreground    = ${colors.fg}
label-urgent-background    = ${colors.red}
label-urgent-padding       = 2

;-----------------------------------------------------

[module/cpu]
type                   = internal/cpu
interval               = 2
format                 = <label>
format-padding         = 2
format-underline       = ${colors.cyan}
label                  = 󰍛 %percentage%%
label-foreground       = ${colors.cyan}

;-----------------------------------------------------

[module/memory]
type                   = internal/memory
interval               = 2
format                 = <label>
format-padding         = 2
format-underline       = ${colors.purple}
label                  = 󰍘 %percentage_used%%
label-foreground       = ${colors.purple}

;-----------------------------------------------------

[module/battery]
type             = internal/battery
battery          = BAT0
adapter          = AC
full-at          = 99
poll-interval    = 5
time-format      = %H:%M

ramp-capacity-0  = 󰁺
ramp-capacity-1  = 󰁻
ramp-capacity-2  = 󰁼
ramp-capacity-3  = 󰁽
ramp-capacity-4  = 󰁾
ramp-capacity-5  = 󰁿
ramp-capacity-6  = 󰂀
ramp-capacity-7  = 󰂁
ramp-capacity-8  = 󰂂
ramp-capacity-9  = 󰂃

format-charging            = <label-charging>
format-charging-padding    = 2
format-charging-underline  = ${colors.green}
label-charging             = 󰂄 %percentage%%
label-charging-foreground  = ${colors.green}

format-discharging             = <ramp-capacity> <label-discharging>
format-discharging-padding     = 2
format-discharging-underline   = ${colors.orange}
ramp-capacity-foreground       = ${colors.orange}
label-discharging              = %percentage%%
label-discharging-foreground   = ${colors.orange}

format-full            = <label-full>
format-full-padding    = 2
format-full-underline  = ${colors.green}
label-full             = 󰁹 Full
label-full-foreground  = ${colors.green}

;-----------------------------------------------------

[module/date]
type             = internal/date
interval         = 1
date             = 󰃭 %d/%m/%Y
time             = 󰥔 %H:%M
label            = %{T2}%time%%{T-}  %date%
label-foreground = ${colors.purple}
format-underline = ${colors.purple}
format-padding   = 3

;-----------------------------------------------------

[module/keyboard]
type              = custom/script
exec              = ~/.config/polybar/fcitx-lang.sh
interval          = 1
format-padding    = 2
format-underline  = ${colors.pink}
format-foreground = ${colors.pink}

;-----------------------------------------------------

[module/wifi]
type              = internal/network
interface         = wlp0s20f3
interval          = 3

format-connected         = <label-connected>
format-connected-padding = 2
format-connected-underline = ${colors.cyan}
label-connected          = 󰤨 %essid%
label-connected-foreground = ${colors.cyan}

format-disconnected         = <label-disconnected>
format-disconnected-padding = 2
format-disconnected-underline = ${colors.red}
label-disconnected          = 󰤭 off
label-disconnected-foreground = ${colors.red}

;-----------------------------------------------------

[module/tray]
type         = internal/tray
tray-spacing = 6px
tray-padding = 2px
