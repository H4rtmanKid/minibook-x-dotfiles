# Backend
backend = "glx"
vsync = true

# Rounded corners
corner-radius = 10
rounded-corners-exclude = [
  "class_g = 'i3bar'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'dialog'",
  "_GTK_FRAME_EXTENTS@"
]

# Shadows
shadow = true
shadow-radius = 14
shadow-opacity = 0.4
shadow-offset-x = -8
shadow-offset-y = -8
shadow-exclude = [
  "class_g = 'i3bar'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@"
]

# Fading
fading = true
fade-delta = 6
fade-in-step = 0.06
fade-out-step = 0.06
fade-exclude = []

# Opacity
inactive-opacity = 0.93
active-opacity = 1.0
frame-opacity = 1.0
inactive-opacity-override = false
opacity-rule = [
  "100:class_g = 'i3bar'",
  "100:class_g = 'rofi'"
]
